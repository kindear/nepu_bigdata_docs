site_name: 大数据智能问答系统 - 课程教程
site_description: NEPU 大数据小学期课程教学内容 - 基于RAG的智能问答系统开发
site_author: NEPU BigData Teaching Team
repo_url: https://github.com/kindear/nepu_bigdata_docs
repo_name: kindear/nepu_bigdata_docs
edit_uri: blob/main/

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换至深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换至浅色模式
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search:
      lang: zh
  - awesome-pages

docs_dir: docs

nav:
  - 首页: index.md
  - 第一章 项目概述与技术路线:
    - 1.1 课程项目说明: 01第一章 项目概述与技术路线/1.1 课程项目说明.md
    - 1.2 系统整体流程: 01第一章 项目概述与技术路线/1.2 系统整体流程.md
    - 1.3 开发环境配置: 01第一章 项目概述与技术路线/1.3 开发环境配置.md
    - 1.4 项目分工与成果要求: 01第一章 项目概述与技术路线/1.4 项目分工与成果要求.md
  - 第二章 数据采集:
    - 2.1 数据源选择: 02第二章 数据采集/2.1 数据源选择.md
    - 2.2 网页请求与内容解析: 02第二章 数据采集/2.2 网页请求与内容解析.md
